<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Kaicoが公開しているWebページとアプリをまとめたポータルサイト">
    <title>KaicoHub</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js?v=20260701-apps" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="KaicoHub home">
        <span class="brand-mark" aria-hidden="true">K</span>
        <span>KaicoHub</span>
      </a>
      <nav class="nav-links" aria-label="主要リンク">
        <a href="#pages">Pages</a>
        <a href="#apps">Apps</a>
        <a href="https://github.com/kaico-hub" rel="noreferrer">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">GitHub portal</p>
        <h1 id="page-title">KaicoHub</h1>
        <p class="lead">KaicoがGitHubで公開しているページとツールをまとめています。</p>
      </section>

      <section class="projects-section" id="pages" aria-labelledby="pages-title">
        <div class="section-heading">
          <h2 id="pages-title">Pages</h2>
          <p id="pagesResultCount" class="result-count" aria-live="polite"></p>
        </div>
        <div class="project-grid" id="pagesGrid"></div>
        <p class="empty-state" id="pagesEmptyState" hidden>表示できるページがありません。</p>
      </section>

      <section class="projects-section" id="apps" aria-labelledby="apps-title">
        <div class="section-heading">
          <h2 id="apps-title">Apps</h2>
          <p id="appsResultCount" class="result-count" aria-live="polite"></p>
        </div>
        <div class="project-grid" id="appsGrid"></div>
        <p class="empty-state" id="appsEmptyState" hidden>表示できるアプリがありません。</p>
      </section>
    </main>
  </body>
</html>
